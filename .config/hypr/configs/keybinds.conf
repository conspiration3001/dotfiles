$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -theme ~/.config/rofi/launchers/type-7/style-3.rasi
$clipboard = cliphist list

$mainMod = SUPER

# Scripts and apps binds

## Exec
bind = $mainMod, T, exec, $terminal
bind = $mainMod, A, exec, $menu
bind = $mainMod, H, exec, $HOME/.config/hypr/scripts/help-menu.sh
bind = $mainMod, D, global, quickshell:dashboard
# Bar position: Super+B cycles; Super+Ctrl+arrows pick a side
bind = $mainMod, B, global, quickshell:barCycle
bind = $mainMod CTRL, up, global, quickshell:barTop
bind = $mainMod CTRL, down, global, quickshell:barBottom
bind = $mainMod CTRL, left, global, quickshell:barLeft
bind = $mainMod CTRL, right, global, quickshell:barRight
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard-windows.sh
bind = $mainMod, L, exec, hyprlock
bind = CTRL SHIFT, Escape, exec, mission-center
bind = $mainMod, I, exec, kitty --class system-ai-agent -e ~/.config/hypr/scripts/agent_ui.py
bind = $mainMod, period, exec, rofimoji
bind = $mainMod SHIFT, N, exec, pkill hyprsunset || hyprsunset -t 4000
# set a random wallpaper
bind = $mainMod, L, global, quickshell:wallpaper
bind = $mainMod, W, global, quickshell:wallpaper
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/theme-switcher.sh
bind = $mainMod, U, exec, ~/.config/hypr/scripts/showcase-anime.sh



# WM Control binds
bind = $mainMod, C, killactive
bind = $mainMod, Q, killactive
bind = $mainMod, M, exec, wlogout
bind = $mainMod, F, togglefloating
bind = $mainMod, G, togglegroup
bind = ALT, Tab, changegroupactive, f
bind = $mainMod, P, exec, ~/.config/hypr/scripts/monitor-mode.sh
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, layoutmsg, togglesplit
## Window Switch
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10
bind = $mainMod, Tab, workspace, previous
bind = $mainMod ALT, left, workspace, e-1
bind = $mainMod ALT, right, workspace, e+1


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10
bind = $mainMod SHIFT, left, movetoworkspace, e-1
bind = $mainMod SHIFT, right, movetoworkspace, e+1


# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-


# Screenshot a window (perfect fit)
bind = $mainMod, Print, exec, grimblast --notify copy area
bind = $mainMod SHIFT, S, exec, grimblast --notify copy area
bind = , Print, exec, grimblast --notify copy screen
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot-window.sh

# -----------------------------------------------------
# Mode Redimensionnement (Resize Submap)
# -----------------------------------------------------
bind = ALT, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , escape, submap, reset
submap = reset
bind = $mainMod, X, exec, $HOME/.config/hypr/scripts/setups.sh
bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/cava-color.sh
bind = $mainMod, N, global, quickshell:dashboard
