source = ~/.config/hypr/matugen-colors.conf

general {
    gaps_in = 4
    gaps_out = 15

    border_size = 2

    col.active_border = $color1 $color3 45deg
    col.inactive_border = $color0

    resize_on_border = true
    extend_border_grab_area = 25
    hover_icon_on_border = true

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2

    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = $color1
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.5
        new_optimizations = true
    }
}
