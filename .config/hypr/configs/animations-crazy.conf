animations {
    enabled = yes

    bezier = linear, 0.00, 0.00, 1.00, 1.00
    bezier = schwoop, 1.00, 0.00, 0.00, 1.00
    bezier = easeOutQuint, 0.23, 1.00, 0.32, 1.00
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1.00
    bezier = almostLinear, 0.50, 0.50, 0.75, 1.00
    bezier = quick, 0.15, 0.00, 0.10, 1.00
    bezier = overshoot, 0.05, 0.90, 0.10, 1.10
    bezier = bigOvershoot, 0.50, 0.00, 0.00, 1.50

    animation = global, 1, 1.00, default
    animation = windows, 1, 4.79, easeOutQuint, popin
    animation = windowsIn, 1, 4.10, overshoot, popin
    animation = windowsOut, 1, 1.49, linear, popin
    animation = layers, 1, 3.81, easeOutQuint, popin
    animation = layersIn, 1, 4.00, easeOutQuint, fade
    animation = layersOut, 1, 1.50, linear, fade
    animation = fade, 1, 3.03, quick
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = border, 1, 5.50, easeOutQuint
    animation = workspaces, 1, 1.00, quick, fade
    animation = workspacesIn, 1, 1.00, quick, fade
    animation = workspacesOut, 1, 1.00, quick, fade
}

dwindle {
    # pseudotile = true
    preserve_split = true
}
