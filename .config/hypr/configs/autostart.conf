#################
### AUTOSTART ###
#################
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprland-session.target


xwayland {
  force_zero_scaling = true
}

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = sleep 5 && QT_QPA_PLATFORM=wayland qs

# set a random wallpaper at start and start hyprpaper
exec-once = sleep 2 && awww-daemon
exec-once = sleep 3 && $HOME/.config/hypr/scripts/wallpapers/set-random.sh
exec-once = $HOME/.config/hypr/scripts/showcase.sh
exec-once = hyprpanel
exec-once = xwaylandvideobridge
