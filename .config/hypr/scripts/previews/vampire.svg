<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <rect width="800" height="450" fill="#0b0b10" rx="15"/>
  
  <!-- Left Window (Grosse fenêtre) -->
  <rect x="20" y="20" width="370" height="410" rx="12" fill="#11111b" stroke="#cba6f7" stroke-width="4"/>
  <circle cx="40" cy="40" r="6" fill="#f38ba8"/>
  <circle cx="60" cy="40" r="6" fill="#f9e2af"/>
  <circle cx="80" cy="40" r="6" fill="#a6e3a1"/>
  <rect x="40" y="80" width="100" height="10" rx="5" fill="#cba6f7" opacity="0.5"/>
  <rect x="40" y="100" width="200" height="10" rx="5" fill="#cdd6f4" opacity="0.3"/>
  <rect x="40" y="120" width="150" height="10" rx="5" fill="#cdd6f4" opacity="0.3"/>

  <!-- Top Right Window -->
  <rect x="410" y="20" width="370" height="195" rx="12" fill="#11111b" stroke="#cba6f7" stroke-width="4"/>
  <circle cx="430" cy="40" r="6" fill="#f38ba8"/>
  <circle cx="450" cy="40" r="6" fill="#f9e2af"/>
  <circle cx="470" cy="40" r="6" fill="#a6e3a1"/>
  <rect x="430" y="80" width="300" height="10" rx="5" fill="#cdd6f4" opacity="0.2"/>
  <rect x="430" y="100" width="250" height="10" rx="5" fill="#cdd6f4" opacity="0.2"/>
  <rect x="430" y="120" width="280" height="10" rx="5" fill="#cdd6f4" opacity="0.2"/>

  <!-- Bottom Right Window -->
  <rect x="410" y="235" width="175" height="195" rx="12" fill="#11111b" stroke="#cba6f7" stroke-width="4"/>
  <circle cx="430" cy="255" r="6" fill="#f38ba8"/>
  <rect x="430" y="280" width="20" height="130" rx="5" fill="#cba6f7" opacity="0.6"/>
  <rect x="460" y="320" width="20" height="90" rx="5" fill="#cba6f7" opacity="0.8"/>
  <rect x="490" y="290" width="20" height="120" rx="5" fill="#cba6f7" opacity="0.4"/>

  <!-- Bottom Far Right Window -->
  <rect x="605" y="235" width="175" height="195" rx="12" fill="#11111b" stroke="#cba6f7" stroke-width="4"/>
  <circle cx="625" cy="255" r="6" fill="#f38ba8"/>
  <rect x="625" y="300" width="100" height="8" rx="4" fill="#a6e3a1"/>
  <rect x="625" y="320" width="120" height="8" rx="4" fill="#a6e3a1"/>
  <rect x="625" y="340" width="80" height="8" rx="4" fill="#a6e3a1"/>

  <!-- Titre au centre du Setup -->
  <rect x="250" y="185" width="300" height="80" rx="40" fill="#1e1e2e" stroke="#cba6f7" stroke-width="3" opacity="0.9"/>
  <text x="400" y="235" font-family="sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">VAMPIRE SETUP</text>
</svg>
